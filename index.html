<style>

  .panel-body{flex:1;overflow-y:auto;padding:14px 18px}

  .tab{flex:1;background:none;border:none;padding:8px 4px;font-family:inherit;font-size:.8rem;
    font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}
  .tabpane{display:none}.tabpane.active{display:block}
  .crops-note{font-size:.76rem;color:var(--muted);line-height:1.4;margin-bottom:12px;
    background:var(--paper);border-radius:6px;padding:8px 10px}
  .crank{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;margin-bottom:6px;

  .crank .info{flex:1;min-width:0}
  .crank .cn{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:6px}
  .crank .cr{font-size:.72rem;color:var(--muted);margin-top:2px;line-height:1.35}
  .crank .badge{font-size:.64rem;font-weight:700;padding:1px 6px;border-radius:10px;color:#fff}

  .crank .scorepill{flex:0 0 auto;font-weight:800;font-size:1.05rem;width:42px;text-align:center}
  .crank .novel{font-size:.6rem;background:var(--gold);color:#fff;padding:1px 5px;border-radius:8px}

  .no-soil{font-size:.82rem;color:var(--muted);font-style:italic;line-height:1.5;padding:8px 0}

const CROPS_R = AGRO.crops, SOILDB = AGRO.soil, CURRENT = AGRO.current, SPR = AGRO.sprites;
// proxy map for unsampled fields
const SOIL_PROXY = {"Cae Bach":"Cae Rhowt","Ffrynt Odyn":"Ffrynt Plas",
  "Bodlawen Agosaf":"Cae Ysgubor","Bodlawen Bellaf":"Cae Ysgubor"};

// ---- soil evolution: start from Yara baseline, adjust by ops logged since sample ----
function evolvedSoil(name){
  const base = SOILDB[name]; if(!base) return null;
  const ev = JSON.parse(JSON.stringify(base));
  const changes = [];
  const rec = (store[name]||{}); const ops = rec.ops||[];
  const sampleDate = base.sampled || "2025-01-20";
  ops.forEach(o=>{
    if(!o.date || o.date < sampleDate) return;
    const t=(o.type||"").toLowerCase();
    // lime raises pH (rough: ~0.1 pH per t/ha on these medium soils)
    if(t.includes("calch")||t.includes("lime")){
      let tha = 0;
      // try to read a rate from product/notes, else assume modest 2 t/ha
      const m=(o.product+" "+o.notes).match(/([\d.]+)\s*(t|tonne|t\/ha)/i);
      tha = m?parseFloat(m[1]):2;
      if(ev.pH!=null){ const d=Math.min(0.6,tha*0.1); ev.pH=+(ev.pH+d).toFixed(1);
        changes.push("+"+d.toFixed(1)+" pH from lime ("+tha+" t/ha, "+fmtDate(o.date)+")"); }
      if(ev.lime_req_tha){ ev.lime_req_tha=Math.max(0,+(ev.lime_req_tha-tha).toFixed(1)); }
    }
    // P/K fertiliser nudges indices up slightly
    if(t.includes("gwrtaith")||t.includes("fertil")){
      if(ev.K_index!=null){ ev.K_index=+(ev.K_index+0.2).toFixed(1); changes.push("+0.2 K Index from fertiliser ("+fmtDate(o.date)+")"); }
      if(ev.P_index!=null){ ev.P_index=+(ev.P_index+0.1).toFixed(1); }
    }
    // harvest offtake draws K down a little
    if(t.includes("cynaeafu")||t.includes("harvest")){
      if(ev.K_index!=null){ ev.K_index=Math.max(0,+(ev.K_index-0.2).toFixed(1)); changes.push("-0.2 K Index from offtake ("+fmtDate(o.date)+")"); }
    }
  });
  return {soil:ev, changes, isProxy:false};
}
function soilFor(name, predicted){
  // returns {soil, changes, isProxy, proxyOf}
  if(SOILDB[name]){
    if(predicted) return evolvedSoil(name);
    return {soil:SOILDB[name], changes:[], isProxy:false};
  }
  const px = SOIL_PROXY[name];
  if(px && SOILDB[px]) return {soil:SOILDB[px], changes:[], isProxy:true, proxyOf:px};
  return null;
}

// ---- suitability scoring (mirror of python engine) ----
function suitOf(s, c){
  if(!s) return null;
  let score=100; const reasons=[];
  const pH=s.pH, lo=c.pH[0], hi=c.pH[1], ilo=c.pH_ideal[0], ihi=c.pH_ideal[1];
  if(pH!=null){
    if(pH<lo){score-=35;reasons.push(["bad","pH "+pH+" below "+lo]);}
    else if(pH>hi){score-=25;reasons.push(["bad","pH "+pH+" above "+hi]);}
    else if(pH>=ilo&&pH<=ihi){reasons.push(["good","pH "+pH+" ideal"]);}
    else{score-=8;reasons.push(["ok","pH "+pH+" ok (ideal "+ilo+"–"+ihi+")"]);}
  }
  if(s.K_index!=null){ if(s.K_index<c.K_min){score-=22;reasons.push(["bad","K Index "+s.K_index+" low"]);}
    else reasons.push(["good","K Index "+s.K_index+" ok"]); }
  if(s.P_index!=null){ if(s.P_index<c.P_min){score-=15;reasons.push(["bad","P Index "+s.P_index+" low"]);}
    else reasons.push(["good","P Index "+s.P_index+" ok"]); }
  if(s.lime_req_tha){ score-=Math.min(22,s.lime_req_tha*3.5); reasons.push(["bad","needs "+s.lime_req_tha+" t/ha lime"]); }
  if(s.Mg_index&&s.Mg_index>=5){ score-=5; reasons.push(["ok","high Mg may limit K"]); }
  score=Math.max(0,Math.round(score));
  const band = score>=80?"good":(score>=58?"ok":"poor");
  return {score, band, reasons};
}
function rankCrops(s){
  const r=[];
  for(const name in CROPS_R){ const res=suitOf(s,CROPS_R[name]); if(res) r.push(Object.assign({crop:name,icon:CROPS_R[name].icon,novel:CROPS_R[name].novel,note:CROPS_R[name].note,practical:CROPS_R[name].practical},res)); }
  r.sort((a,b)=>b.score-a.score);
  return r;
}

    k("Phosphorus (P)",s.P_ppm," ppm",s.P_index, s.P_index!=null&&s.P_index<2?"low":null)+
    k("Potassium (K)",s.K_ppm," ppm",s.K_index, s.K_index!=null&&s.K_index<2?"low":null)+
    k("Magnesium (Mg)",s.Mg_ppm," ppm",s.Mg_index, s.Mg_index>=5?"high":null)+
    k("Calcium (Ca)",s.Ca_ppm," ppm")+
    k("Sulphur (S)",s.S_ppm," ppm",null, s.S_ppm!=null&&s.S_ppm<6?"low":null)+
    k("Boron (B)",s.B_ppm," ppm")+
    k("Manganese (Mn)",s.Mn_ppm," ppm")+
    k("Zinc (Zn)",s.Zn_ppm," ppm")+
    k("CEC",s.CEC," meq")+
    k("Organic matter",s.OM_pct," %")+
    k("Lime req.",s.lime_req_tha,s.lime_req_tha?" t/ha":"",null,s.lime_req_tha?"low":null)+
    '</div>';
  let tex = s.texture? '<div class="soil-meta">Math: <b>'+s.texture+'</b>'+
    (s.sand?' — '+s.sand+'% tywod/sand, '+s.silt+'% silt, '+s.clay+'% clai/clay':'')+'</div>' : '';
  const meta='<div class="soil-meta">Sampl Yara: '+(s.sampled||"Ion 2025")+(sf.isProxy?'':' · cnwd ar y pryd: '+(s.crop_sampled||"—"))+'</div>';
  body.innerHTML=head+grid+tex+meta;
}


const TYPE_COLOURS = {

/* ---- sync status UI ---- */
const statusEl=document.getElementById('syncStatus'), textEl=document.getElementById('syncText');

/* ---- GitHub read ---- */
async function pullRemote(){
  if(!token){ setStatus('ro','Cysylltwch i weld cofnodion · Connect to see records'); return; }
  setStatus('busy','Llwytho · Loading…');
  try{
    const url=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}?ref=${BRANCH}`;
    const headers={'Accept':'application/vnd.github+json','Authorization':'Bearer '+token};
    const r=await fetch(url,{headers});
    if(r.status===404){ sha=null; setStatus('ok','Wedi cysylltu · Connected (gwag / empty)'); return; }
    if(r.status===401||r.status===403){ setStatus('err','Token annilys · Token rejected'); 
      alert('Gwrthodwyd y token · Token rejected.\n\nGwiriwch fod ganddo hawl Contents (read & write) ar y repo caeau.\nCheck it has Contents read & write on the caeau repo.'); return; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    sha=j.sha;
    const content=JSON.parse(decodeURIComponent(escape(atob(j.content))));
    store=content.fields||content||{};
    saveLocal();
    setStatus('ok','Wedi cysylltu · Connected');
    refreshAll();
  }catch(e){
    setStatus('err','All-lein · Offline (lleol / local)');
  }
}

/* ---- GitHub write ---- */
async function pushRemote(){
  if(!token){openToken();return false;}
  setStatus('busy','Cadw · Saving…');
  try{
    const url=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`;
    const payload={fields:store, updated:new Date().toISOString(), by:author||'?'};
    const body={
      message:`Diweddaru cofnod caeau (${author||'?'}) ${new Date().toISOString().slice(0,16).replace('T',' ')}`,
      content:btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2)))),
      branch:BRANCH
    };
    if(sha)body.sha=sha;
    const r=await fetch(url,{method:'PUT',headers:{'Authorization':'Bearer '+token,
      'Accept':'application/vnd.github+json'},body:JSON.stringify(body)});
    if(r.status===409){ // sha conflict — someone else wrote; pull and retry once
      await pullRemote(); return pushRemote();
    }
    if(!r.ok){ const t=await r.text(); throw new Error('HTTP '+r.status+' '+t.slice(0,120)); }
    const j=await r.json(); sha=j.content.sha;
    setStatus('ok','Wedi cadw · Saved');
    setTimeout(()=>setStatus('ok','Wedi cysylltu · Connected'),1500);
    return true;
  }catch(e){
    setStatus('err','Methu cadw · Save failed');
    alert('Methu cadw i GitHub · Could not save to GitHub.\n\n'+e.message+
      '\n\nMae eich newid wedi ei gadw\'n lleol · Your change is saved locally.');
    return false;
  }
}

async function commit(){ saveLocal(); await pushRemote(); }

function opCostStr(o){
  if(!o.cost)return '';
  if(o.cost.mode==='rate')return '£'+o.cost.total.toFixed(2)+' ('+'£'+o.cost.rate+'/ha × '+o.cost.area+' ha)';
  return '£'+(o.cost.total||0).toFixed(2);
}
function opYieldStr(o){
  if(!o.yield)return '';
  const y=o.yield,parts=[];
  if(y.tonnes)parts.push(y.tonnes+' t'+(y.tha?' ('+y.tha+' t/ha)':''));
  if(y.bales)parts.push(y.bales+' byrnau/bales');
  if(y.value)parts.push('£'+y.value.toFixed(2));
  return parts.join(' · ');
}
function renderOps(name){
  const rec=store[name]||{};
  const ops=(rec.ops||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const list=document.getElementById('opList');
  // totals
  let spend=0,income=0;
  (rec.ops||[]).forEach(o=>{ if(o.cost&&o.cost.total)spend+=o.cost.total; if(o.yield&&o.yield.value)income+=o.yield.value; });
  const totalEl=document.getElementById('fieldTotals');
  if(totalEl){
    if(spend||income){
      let s='<span title="Cyfanswm gwariant · Total spend">Gwariant · Spend: <b>£'+spend.toFixed(2)+'</b></span>';
      if(income)s+=' &nbsp;·&nbsp; <span title="Gwerth cynnyrch · Harvest value">Cynnyrch · Yield: <b>£'+income.toFixed(2)+'</b></span>';
      totalEl.innerHTML=s;totalEl.style.display='block';
    }else{totalEl.style.display='none';}
  }
  if(!ops.length){list.innerHTML='<div class="empty-log">Dim gweithredoedd wedi cofnodi eto.<br>No operations logged yet.</div>';return;}
  list.innerHTML=ops.map(o=>{
    const c=typeColour(o.type);
    const cost=opCostStr(o),yld=opYieldStr(o);
    return '<div class="op"><div class="op-top">'+
      '<span class="op-type"><span class="op-type-badge" style="background:'+c+'"></span>'+esc(o.type)+'</span>'+
      '<span class="op-date">'+fmtDate(o.date)+'</span></div>'+
      (o.product?'<div class="op-detail">'+esc(o.product)+'</div>':'')+
      (cost?'<div class="op-detail" style="color:var(--soil);font-weight:600">'+cost+'</div>':'')+
      (yld?'<div class="op-detail" style="color:var(--green);font-weight:600">⛁ '+yld+'</div>':'')+
      (o.notes?'<div class="op-detail" style="color:#777">'+esc(o.notes)+'</div>':'')+
      (o.by?'<div class="op-detail" style="color:#999;font-size:.72rem">— '+esc(o.by)+'</div>':'')+
      '<button class="op-del" data-id="'+o.id+'">dileu · delete</button></div>';
  }).join('');
  list.querySelectorAll('.op-del').forEach(b=>b.onclick=async()=>{
    if(confirm('Dileu y gweithred hwn? · Delete this operation?')){
      store[name].ops=store[name].ops.filter(x=>x.id!=b.dataset.id);
      await commit();renderOps(name);
    }
  });
}

function fmtDate(d){if(!d)return '';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const opModal=document.getElementById('opModal');

  el.textContent=(rate&&area)?('= £'+(rate*area).toFixed(2)):'';
}
function syncYieldVis(){
  document.getElementById('yieldSection').style.display=

}
function calcYield(){
  const t=parseFloat(document.getElementById('yldTonnes').value)||0;
  const a=parseFloat(document.getElementById('yldArea').value)||0;
  const el=document.getElementById('yldCalc');
  el.textContent=(t&&a)?('= '+(t/a).toFixed(2)+' t/ha'):'';

document.getElementById('opSave').onclick=async()=>{
  if(!selected)return;
  const type=document.getElementById('opType').value;
  // cost
  let cost=null;
  const mode=document.getElementById('costMode').value;
  if(mode==='total'){
    const v=parseFloat(document.getElementById('costTotal').value);
    if(v>0)cost={mode:'total',total:v};
  }else{
    const rate=parseFloat(document.getElementById('costRate').value)||0;
    const area=parseFloat(document.getElementById('costArea').value)||0;
    if(rate>0&&area>0)cost={mode:'rate',rate,area,total:+(rate*area).toFixed(2)};
  }
  // yield (harvest only)
  let yield_=null;
  if(isHarvest(type)){
    const t=parseFloat(document.getElementById('yldTonnes').value)||0;
    const bales=parseFloat(document.getElementById('yldBales').value)||0;
    const area=parseFloat(document.getElementById('yldArea').value)||0;
    const value=parseFloat(document.getElementById('yldValue').value)||0;
    if(t||bales||value){
      yield_={};
      if(t)yield_.tonnes=t;
      if(bales)yield_.bales=bales;
      if(area)yield_.area=area;
      if(value)yield_.value=value;
      if(t&&area)yield_.tha=+(t/area).toFixed(2);
    }
  }
  const op={id:Date.now()+''+Math.floor(Math.random()*999),
    type,date:document.getElementById('opDate').value,
    product:document.getElementById('opProduct').value.trim(),
    notes:document.getElementById('opNotes').value.trim(),
    cost,yield:yield_,by:author||''};

  if(!store[selected].ops)store[selected].ops=[];
  store[selected].ops.push(op);

  await commit();renderOps(selected);
};
